# SQL Commenter Agent — Default Configuration
# Override by passing config=/path/to/your.properties as agent argument.

# Comma-separated list of active rule IDs.
# Available: traceparent, opentelemetry, framework, db_driver, caller, thread,
#            application, environment, service
# Leave empty to enable all built-in rules.
rules=traceparent,framework,caller,environment

# Comment format: url_encoded (SQLCommenter spec) or plain (human readable)
format=url_encoded

# Static key=value tags added to every SQL comment.
# static_tags=env=production,region=us-east-1

# Restrict the caller rule to your application package (recommended).
# rule.caller.app_package=com.example.myapp

# Service rule: extract top-level service name from the call stack.
# rule.service.app_package=com.example.myapp
# rule.service.prefix=com.example.myapp.services
# rule.service.extract=subpackage
# rule.service.exclude_packages=com.example.myapp.persistence
# rule.service.max_depth=200

# Verbose mode: log each instrumented SQL query (for debugging only).
verbose=false

# Custom JDBC class prefixes to instrument (overrides defaults).
# Defaults cover JBoss/WildFly (IronJacamar), HikariCP, DBCP2, c3p0, Tomcat JDBC.
# Add native driver prefixes only in non-modular environments (Tomcat, Spring Boot).
# jdbc_prefixes=org.jboss.jca.adapters.jdbc.,com.zaxxer.hikari.,oracle.jdbc.
